<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/8gH24xdm/Swel-Taw-Logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to DailySaleCalc App...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            color: #333;
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #007bff;
            animation: spin 1s linear infinite;
            margin-bottom: 16dp;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-size: 18px; margin: 10px 0; }
        p { font-size: 14px; color: #666; }
    </style>
    
    <script>
        window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
            const base64Data = urlParams.get('data');
            
            if (base64Data) {
                              const appIntentUrl = "intent://share?data=" + encodeURIComponent(base64Data) + "#Intent;scheme=dscalc;package=Dabria.JinX.DailySaleCalc;end";
                
             window.location.href = appIntentUrl;
                
                              setTimeout(function() {
                    document.getElementById("status-text").innerHTML = "App ပွင့်မလာပါက အောက်ပါခလုတ်ကို နှိပ်ပါ သို့မဟုတ် App ကို သေချာစွာ သွင်းထားပါရန် လိုအပ်ပါသည်။";
                    document.getElementById("btn-manual").style.display = "block";
                    document.getElementById("btn-manual").href = appIntentUrl;
                }, 5000);
            } else {
                document.getElementById("status-text").innerHTML = "မှားယွင်းသော လင့်ခ်ဖြစ်နေပါသည်။ ဒေတာ မပါရှိပါ။";
                document.getElementById("spinner").style.display = "none";
            }
        };
    </script>
</head>
<body>

    <div id="spinner" class="spinner"></div>
    <h2 id="status-title">App သို့ ချိတ်ဆက်နေပါသည်...</h2>
    <p id="status-text">ခေတ္တစောင့်ဆိုင်းပေးပါ၊ DailySaleCalc App အား အလိုအလျောက် ဖွင့်လှစ်ပေးပါလိမ့်မည်။</p>
    
    <a id="btn-manual" href="#" style="display:none; margin-top:15px; padding:10px 20px; background-color:#007bff; color:white; text-decoration:none; border-radius:5px; font-size:14px; font-weight:bold;">
        App အား ကိုယ်တိုင်ဖွင့်မည်
    </a>

</body>
</html>
